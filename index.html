        var sidebar = document.getElementById('sidebar');
        var toggle = document.getElementById('sidebar-toggle');
        var closeBtn = document.getElementById('sidebar-close');
        var listContainer = document.getElementById('points-list');
        var searchInput = document.getElementById('search-input');
        var isOpen = false;

        function showPoint(lat, lon, popupHtml) {
            var mapObj = getMap();
            if (!mapObj) {
                console.error('Карта не найдена');
                return;
            }
            // Удаляем старый временный маркер
            if (window.tempMarker) {
                mapObj.removeLayer(window.tempMarker);
            }
            mapObj.setView([lat, lon], 18);
            var popup = L.popup()
                .setLatLng([lat, lon])
                .setContent(popupHtml);
            window.tempMarker = L.marker([lat, lon]).addTo(mapObj);
            window.tempMarker.bindPopup(popup).openPopup();
        }

        function renderList(filterText) {
            filterText = (filterText || '').toLowerCase();
            var html = '';
            var filtered = points.filter(p => p.name.toLowerCase().includes(filterText));
            if (filtered.length === 0) {
                html = '<div style="text-align:center; color:#999; padding:20px;">Ничего не найдено</div>';
            } else {
                filtered.forEach(function(p) {
                    html += '<div class="point-item" data-lat="' + p.lat + '" data-lon="' + p.lon + '" data-popup="' + encodeURIComponent(p.popup) + '" style="padding:10px 12px; border-bottom:1px solid #f0f0f0; cursor:pointer; transition:background 0.2s; display:flex; align-items:center; gap:10px;">';
                    html += '<span style="background:#e74c3c; color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold;">' + p.id + '</span>';
                    html += '<span style="font-size:14px;">' + p.name + '</span>';
                    html += '</div>';
                });
            }
            listContainer.innerHTML = html;

            document.querySelectorAll('.point-item').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    var lat = parseFloat(el.dataset.lat);
                    var lon = parseFloat(el.dataset.lon);
                    var popupHtml = decodeURIComponent(el.dataset.popup);
                    showPoint(lat, lon, popupHtml);
                    sidebar.style.left = '-420px';
                    isOpen = false;
                });
                el.addEventListener('mouseenter', function() {
                    this.style.background = '#f9f9f9';
                });
                el.addEventListener('mouseleave', function() {
                    this.style.background = 'transparent';
                });
            });
        }

        toggle.addEventListener('click', function() {
            if (isOpen) {
                sidebar.style.left = '-420px';
                isOpen = false;
            } else {
                sidebar.style.left = '0';
                isOpen = true;
                renderList(searchInput.value);
            }
        });
        closeBtn.addEventListener('click', function() {
            sidebar.style.left = '-420px';
            isOpen = false;
        });
        searchInput.addEventListener('input', function() {
            renderList(this.value);
        });

        renderList('');
    })();
    </script>
